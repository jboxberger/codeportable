# Build CodePortable.exe and publish it as a GitHub Release whenever a
# SemVer tag (x.y.z) is pushed. The release asset is named CodePortable.exe
# (unversioned) so the "latest" download link stays stable:
#
#   https://github.com/jboxberger/codeportable/releases/latest/download/CodePortable.exe
#
# The Windows GUI EXE (icon + manifest embedded, no console) is cross-compiled
# on Linux — Go handles GOOS=windows and the rsrc-generated .syso natively.

name: release

on:
  push:
    tags:
      - "[0-9]+.[0-9]+.[0-9]+"

permissions:
  contents: write   # needed to create the GitHub Release

jobs:
  build-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Embed icon + manifest as Windows resource
        run: go run github.com/akavel/rsrc@v0.10.2 -ico code.ico -manifest app.manifest -arch amd64 -o rsrc_windows_amd64.syso

      - name: Build CodePortable.exe
        env:
          GOOS: windows
          GOARCH: amd64
          CGO_ENABLED: "0"
        run: go build -trimpath -ldflags "-s -w -H=windowsgui" -o CodePortable.exe .

      - name: Generate SHA-256 sidecar
        run: sha256sum CodePortable.exe > CodePortable.exe.sha256

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: CodePortable ${{ github.ref_name }}
          body: |
            Portable Visual Studio Code launcher — release ${{ github.ref_name }}.

            **Download:** [CodePortable.exe](https://github.com/jboxberger/codeportable/releases/latest/download/CodePortable.exe)

            Verify with the accompanying `CodePortable.exe.sha256`.
          files: |
            CodePortable.exe
            CodePortable.exe.sha256
